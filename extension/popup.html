<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <style>
    /* ---- Reset & Base ---- */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      min-height: 320px;
      max-height: 600px;
      overflow-y: auto;
      margin: 0 auto;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      direction: ltr;
      font-size: 13px;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 700;
    }

    .health-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #999;
      transition: background 0.3s;
    }

    .health-dot.online { background: #34a853; }
    .health-dot.offline { background: #ea4335; }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      background: #fff;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: color 0.2s, border-bottom 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
    }

    .tab-btn.active {
      color: #1a73e8;
      border-bottom-color: #1a73e8;
    }

    .tab-content {
      display: none;
      padding: 16px;
    }

    .tab-content.active {
      display: block;
    }

    /* ---- Scan Tab ---- */
    .verdict-banner {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .verdict-banner.clean {
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #34a853;
    }

    .verdict-banner.anomaly {
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #ea4335;
    }

    .verdict-banner.hard-error {
      background: #fce8e6;
      color: #a50e0e;
      border: 2px solid #c5221f;
    }

    .verdict-banner.warning {
      background: #fef7e0;
      color: #e37400;
      border: 1px solid #f9ab00;
    }

    .verdict-banner.idle {
      background: #f1f3f4;
      color: #666;
      border: 1px solid #dadce0;
    }

    .strategy-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-left: 3px solid #dadce0;
    }

    .strategy-card.flagged { border-left-color: #ea4335; border-right-color: transparent; }
    .strategy-card.passed { border-left-color: #34a853; border-right-color: transparent; }

    .strategy-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .strategy-name {
      font-weight: 600;
      font-size: 12px;
    }

    .strategy-score {
      font-size: 11px;
      color: #666;
      direction: ltr;
    }

    .strategy-explanation {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
    }

    /* ---- Upload Tab ---- */
    .upload-zone {
      border: 2px dashed #dadce0;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 12px;
    }

    .upload-zone:hover {
      border-color: #1a73e8;
      background: #e8f0fe;
    }

    .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .upload-zone .label { font-size: 13px; color: #555; }

    .upload-zone input[type="file"] {
      display: none;
    }

    .upload-progress {
      display: none;
      margin-bottom: 12px;
    }

    .progress-bar-outer {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar-inner {
      height: 100%;
      background: #1a73e8;
      border-radius: 3px;
      width: 0%;
      transition: width 0.2s;
    }

    .progress-text {
      font-size: 11px;
      color: #666;
      text-align: center;
    }

    .summary-box {
      display: none;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #f1f3f4;
      border: 1px solid #dadce0;
    }

    .summary-stats {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
    }

    .stat-value.total { color: #1a73e8; }
    .stat-value.anomalies { color: #ea4335; }
    .stat-value.clean-count { color: #34a853; }

    .stat-label {
      font-size: 10px;
      color: #888;
    }

    .results-table-wrap {
      display: none;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .results-table th {
      background: #f1f3f4;
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    .results-table td {
      padding: 6px 8px;
      border-top: 1px solid #eee;
    }

    .results-table tr.row-anomaly td {
      background: #fce8e6;
    }

    .badge-anomaly {
      display: inline-block;
      background: #ea4335;
      color: #fff;
      padding: 1px 7px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
    }

    .badge-hard {
      background: #a50e0e;
    }

    .badge-warning {
      background: #f9ab00;
      color: #333;
    }

    .badge-clean {
      display: inline-block;
      background: #34a853;
      color: #fff;
      padding: 1px 7px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>Sadeed</h1>
    <div class="health-dot" id="healthDot" title="Server status"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="scan">Page Scan</button>
    <button class="tab-btn" data-tab="upload">Upload Excel</button>
  </div>

  <!-- Scan Tab -->
  <div class="tab-content active" id="tab-scan">
    <div class="verdict-banner idle" id="scanVerdict">
      No scan yet. Click the "Scan Form" button on the page.
    </div>
    <div id="scanStrategies"></div>
  </div>

  <!-- Upload Tab -->
  <div class="tab-content" id="tab-upload">
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📄</div>
      <div class="label">Drag an Excel file here or click to select</div>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>

    <div class="upload-progress" id="uploadProgress">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="summary-box" id="summaryBox">
      <div class="summary-stats">
        <div class="stat">
          <div class="stat-value total" id="statTotal">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value anomalies" id="statAnomalies">0</div>
          <div class="stat-label">Anomalies</div>
        </div>
        <div class="stat">
          <div class="stat-value clean-count" id="statClean">0</div>
          <div class="stat-label">Clean</div>
        </div>
      </div>
    </div>

    <div class="results-table-wrap" id="resultsTableWrap">
      <table class="results-table" id="resultsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Verdict</th>
            <th>GE</th>
            <th>SVM</th>
            <th>LLM</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- SheetJS (bundled locally for Manifest V3 CSP compliance) -->
  <script src="lib/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
