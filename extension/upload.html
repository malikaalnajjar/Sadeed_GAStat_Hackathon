<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sadeed Excel Upload</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", Tahoma, Arial, sans-serif; background: #f5f7fa; color: #1a1a1a; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header .subtitle { font-size: 13px; opacity: 0.75; }
    .health-dot { width: 10px; height: 10px; border-radius: 50%; background: #999; }
    .health-dot.online { background: #34a853; }
    .health-dot.offline { background: #ea4335; }

    .container { max-width: 960px; margin: 24px auto; padding: 0 24px; }

    .upload-zone {
      border: 2px dashed #c0c8d4; border-radius: 14px; padding: 48px; text-align: center;
      cursor: pointer; transition: all 0.2s; background: #fff; margin-bottom: 24px;
    }
    .upload-zone:hover { border-color: #1a73e8; background: #e8f0fe; }
    .upload-zone.dragging { border-color: #1a73e8; background: #e8f0fe; }
    .upload-zone .icon { font-size: 40px; margin-bottom: 8px; }
    .upload-zone .label { font-size: 15px; color: #555; }
    .upload-zone .hint { font-size: 12px; color: #999; margin-top: 6px; }

    .progress-section { display: none; margin-bottom: 24px; background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .progress-bar-outer { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar-inner { height: 100%; background: linear-gradient(90deg, #1a73e8, #34a853); border-radius: 4px; width: 0%; transition: width 0.3s; }
    .progress-text { font-size: 13px; color: #666; text-align: center; }

    .summary-cards { display: none; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .summary-cards.visible { display: grid; }
    .card { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .card-value { font-size: 32px; font-weight: 800; }
    .card-value.total { color: #1a73e8; }
    .card-value.anomalies { color: #ea4335; }
    .card-value.clean { color: #34a853; }
    .card-label { font-size: 12px; color: #888; margin-top: 4px; }

    .results-section { display: none; }
    .results-section.visible { display: block; }

    .results-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .results-table th { background: #f1f3f4; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; }
    .results-table td { padding: 12px 16px; border-top: 1px solid #eee; font-size: 13px; vertical-align: top; }
    .results-table tr:hover td { background: #f8f9fa; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-clean { background: #e6f4ea; color: #137333; }
    .badge-warning { background: #fef7e0; color: #e37400; }
    .badge-hard { background: #fce8e6; color: #a50e0e; }

    .score { font-family: "Courier New", monospace; font-size: 12px; }
    .score-ok { color: #34a853; }
    .score-bad { color: #ea4335; }

    .explanation-cell { max-width: 300px; font-size: 12px; color: #555; line-height: 1.5; }

    .expand-btn { background: none; border: none; color: #1a73e8; cursor: pointer; font-size: 11px; font-weight: 600; padding: 2px 0; }
    .expand-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Sadeed Excel Upload</h1>
      <div class="subtitle">Upload an Excel file to scan all rows for anomalies</div>
    </div>
    <div class="health-dot" id="healthDot" title="Checking..."></div>
  </div>

  <div class="container">
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📊</div>
      <div class="label">Click to select an Excel file</div>
      <div class="hint">Supports .xlsx and .xls files</div>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="summary-cards" id="summaryCards">
      <div class="card">
        <div class="card-value total" id="statTotal">0</div>
        <div class="card-label">Total Records</div>
      </div>
      <div class="card">
        <div class="card-value anomalies" id="statAnomalies">0</div>
        <div class="card-label">Anomalies</div>
      </div>
      <div class="card">
        <div class="card-value clean" id="statClean">0</div>
        <div class="card-label">Clean</div>
      </div>
    </div>

    <div class="results-section" id="resultsSection">
      <table class="results-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Verdict</th>
            <th>GE</th>
            <th>SVM</th>
            <th>LLM</th>
            <th>Explanation</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script src="lib/xlsx.full.min.js"></script>
  <script src="upload.js"></script>
</body>
</html>
